apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tracelink-backend-hpa
  namespace: tracelink
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tracelink-backend
  minReplicas: 2 # Always keep 2 for high availability
  maxReplicas: 6 # Scale up to 6 pods under heavy load
  metrics:
    # Scale based on CPU — standard for web apps
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70 # Scale up when avg CPU > 70%
    # Also scale on memory pressure
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80 # Scale up when avg memory > 80%
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60 # Wait 60s before scaling up again
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60 # Add max 2 pods per minute
    scaleDown:
      stabilizationWindowSeconds: 300 # Wait 5 mins before scaling down (avoids flapping)
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60 # Remove max 1 pod per minute
